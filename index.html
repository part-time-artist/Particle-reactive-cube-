<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Point</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        #canvas-container { 
            width: 100vw; 
            height: 100vh; 
            touch-action: none; 
        }
        #info {
            position: absolute;
            top: 40px;
            left: 40px;
            pointer-events: none;
            z-index: 10;
        }
        h2 {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
        }
        .status-item {
            font-size: 0.5rem;
            color: rgba(255, 255, 255, 0.2); 
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 10px;
        }
        
        #controls-ui {
            position: absolute;
            bottom: 40px;
            right: 40px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.4);
            padding: 12px 24px;
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.6s cubic-bezier(0.2, 1, 0.2, 1);
            pointer-events: auto;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.2);
        }

        #sound-toggle {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.02);
            animation: pulse-glow 3s infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0px rgba(255, 255, 255, 0); border-color: rgba(255, 255, 255, 0.15); }
            50% { box-shadow: 0 0 15px rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.4); }
            100% { box-shadow: 0 0 0px rgba(255, 255, 255, 0); border-color: rgba(255, 255, 255, 0.15); }
        }

        .btn.active {
            border-color: rgba(178, 211, 194, 0.4);
            color: #b2d3c2;
            animation: none;
        }

        #record-btn {
            display: none; /* Only show when sound is active */
            border-color: rgba(255, 100, 100, 0.1);
        }
        #record-btn.active {
            color: #ff6e6e;
            border-color: rgba(255, 110, 110, 0.4);
            background: rgba(255, 110, 110, 0.05);
        }

        #watermark {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.5rem;
            color: rgba(255, 255, 255, 0.1);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 300;
            pointer-events: none;
        }

        /* Mobile specific adjustments */
        @media (max-width: 767px) {
            #info { top: 25px; left: 25px; }
            #controls-ui { bottom: 25px; right: 25px; }
            #watermark { bottom: 15px; font-size: 0.45rem; width: 100%; text-align: center; }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">
        <h2>Flux Point</h2>
        <div class="status-item">made by parttimeartist</div>
    </div>

    <div id="controls-ui">
        <button id="sound-toggle" class="btn">Connect Atmosphere</button>
        <button id="record-btn" class="btn">Record Session</button>
    </div>

    <div id="watermark">made by parttimeartist</div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const isMobile = window.innerWidth < 768;
        const config = {
            color: new THREE.Color(0xfff8e1), 
            bgColor: new THREE.Color(0x050505),
            pointCount: isMobile ? 12000 : 20000,
            pointSize: isMobile ? 0.010 : 0.007, 
            speed: isMobile ? 0.4 : 0.2,
            boxSize: isMobile ? 1.6 : 3.8,       
            gravityRadius: isMobile ? 1.4 : 2.5,
            gravityStrength: isMobile ? 0.14 : 0.12, 
            fogNear: isMobile ? 3.0 : 4.0,
            fogFar: isMobile ? 10.0 : 12.0
        };

        // Advanced Audio System (Interactive Harmonic Instrument)
        let audioCtx, masterGain, soundEnabled = false;
        let droneOsc, droneGain, filterNode, recorder, audioChunks = [];
        const notes = [130.81, 164.81, 196.00, 220.00, 261.63, 329.63, 392.00, 440.00, 523.25, 659.25]; 
        const soundToggle = document.getElementById('sound-toggle');
        const recordBtn = document.getElementById('record-btn');

        const initAudio = () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.8;
            masterGain.connect(audioCtx.destination);

            filterNode = audioCtx.createBiquadFilter();
            filterNode.type = 'lowpass';
            filterNode.frequency.value = 450; 
            filterNode.connect(masterGain);

            droneOsc = audioCtx.createOscillator();
            droneGain = audioCtx.createGain();
            droneOsc.type = 'sine';
            droneOsc.frequency.value = 65.41; 
            droneGain.gain.value = 0.012; 
            droneOsc.connect(droneGain);
            droneGain.connect(filterNode);
            droneOsc.start();

            // Prepare Recording Stream
            const dest = audioCtx.createMediaStreamDestination();
            masterGain.connect(dest);
            recorder = new MediaRecorder(dest.stream);
            
            recorder.ondataavailable = (e) => audioChunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'flux-point-session.webm';
                a.click();
                audioChunks = [];
            };

            soundEnabled = true;
            soundToggle.textContent = 'Active';
            soundToggle.classList.add('active');
            recordBtn.style.display = 'block';
        };

        const playNote = (intensity) => {
            if (!soundEnabled || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const noteIndex = Math.floor(THREE.MathUtils.mapLinear(pointer.y, -1, 1, 0, notes.length - 1));
            const freq = notes[THREE.MathUtils.clamp(noteIndex, 0, notes.length - 1)];
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.32 * intensity, audioCtx.currentTime + 0.15); 
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 4.5); 
            
            osc.connect(gain);
            gain.connect(filterNode);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 5.0);
        };

        soundToggle.addEventListener('click', async () => {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
        });

        recordBtn.addEventListener('click', () => {
            if (recorder.state === 'inactive') {
                recorder.start();
                recordBtn.textContent = 'Stop & Save';
                recordBtn.classList.add('active');
            } else {
                recorder.stop();
                recordBtn.textContent = 'Record Session';
                recordBtn.classList.remove('active');
            }
        });

        const scene = new THREE.Scene();
        scene.background = config.bgColor;
        scene.fog = new THREE.Fog(config.bgColor, config.fogNear, config.fogFar);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = isMobile ? 4.5 : 6;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enableRotate = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = isMobile ? 1.4 : 0.35;

        const particlesGeometry = new THREE.BufferGeometry();
        const count = config.pointCount;
        const positions = new Float32Array(count * 3);
        const originals = new Float32Array(count * 3);
        const lives = new Float32Array(count);
        const lifeSpeeds = new Float32Array(count);

        for (let i = 0; i < count; i++) {
            const face = Math.floor(Math.random() * 6);
            const u = (Math.random() - 0.5) * config.boxSize;
            const v = (Math.random() - 0.5) * config.boxSize;
            const half = config.boxSize / 2;
            let x, y, z;
            switch (face) {
                case 0: x = half; y = u; z = v; break;
                case 1: x = -half; y = u; z = v; break;
                case 2: x = u; y = half; z = v; break;
                case 3: x = u; y = -half; z = v; break;
                case 4: x = u; y = v; z = half; break;
                case 5: x = u; y = v; z = -half; break;
            }
            positions[i * 3] = x; positions[i * 3 + 1] = y; positions[i * 3 + 2] = z;
            originals[i * 3] = x; originals[i * 3 + 1] = y; originals[i * 3 + 2] = z;
            lives[i] = Math.random(); lifeSpeeds[i] = 0.2 + Math.random() * 0.6;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particlesGeometry.setAttribute('life', new THREE.BufferAttribute(lives, 1));

        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uColor: { value: config.color },
                uSize: { value: config.pointSize * 60 * window.devicePixelRatio },
                fogColor: { value: config.bgColor },
                fogNear: { value: config.fogNear },
                fogFar: { value: config.fogFar }
            },
            vertexShader: `
                attribute float life;
                varying float vAlpha;
                uniform float uSize;
                varying float vFogDepth;
                void main() {
                    vAlpha = sin(life * 3.14159);
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = uSize * vAlpha * (10.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                    vFogDepth = -mvPosition.z;
                }
            `,
            fragmentShader: `
                uniform vec3 uColor;
                varying float vAlpha;
                uniform vec3 fogColor;
                uniform float fogNear;
                uniform float fogFar;
                varying float vFogDepth;
                void main() {
                    if (length(gl_PointCoord - vec2(0.5, 0.5)) > 0.475) discard;
                    float fogFactor = smoothstep(fogNear, fogFar, vFogDepth);
                    float visibility = 1.0 - fogFactor;
                    gl_FragColor = vec4(uColor, vAlpha * visibility);
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.NormalBlending
        });

        const pointCloud = new THREE.Points(particlesGeometry, shaderMaterial);
        scene.add(pointCloud);

        const pointer = new THREE.Vector2(999, 999);
        const prevPointer = new THREE.Vector2(999, 999);
        let motionIntensity = 0;

        const updatePointer = (x, y) => {
            pointer.x = (x / window.innerWidth) * 2 - 1;
            pointer.y = -(y / window.innerHeight) * 2 + 1;
        };

        window.addEventListener('pointermove', (e) => updatePointer(e.clientX, e.clientY));
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) updatePointer(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1) updatePointer(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        window.addEventListener('touchend', () => { pointer.x = 999; pointer.y = 999; });

        const clock = new THREE.Clock();
        let soundCooldown = 0;

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            const distMoved = pointer.distanceTo(prevPointer);
            
            if (distMoved > 0.0005 && pointer.x < 500) {
                motionIntensity = THREE.MathUtils.lerp(motionIntensity, 1.0, delta * 3);
                soundCooldown -= delta;
                if (soundCooldown <= 0 && motionIntensity > 0.12) {
                    playNote(motionIntensity);
                    soundCooldown = 0.3 + (1.0 - motionIntensity) * 0.5;
                }
            } else {
                motionIntensity = THREE.MathUtils.lerp(motionIntensity, 0, delta * 1.5);
            }
            prevPointer.copy(pointer);

            if (soundEnabled) {
                droneGain.gain.setTargetAtTime(0.012 + motionIntensity * 0.03, audioCtx.currentTime, 0.5);
                filterNode.frequency.setTargetAtTime(300 + motionIntensity * 600, audioCtx.currentTime, 0.5);
            }

            const effectiveStrength = config.gravityStrength * (isMobile ? 1.5 : 1.0) * motionIntensity;
            pointCloud.rotation.x += delta * 0.03;
            pointCloud.rotation.y += delta * 0.05;

            const positionArray = particlesGeometry.attributes.position.array;
            const lifeArray = particlesGeometry.attributes.life.array;
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(pointer, camera);
            const inv = new THREE.Matrix4().copy(pointCloud.matrixWorld).invert();
            const localRay = raycaster.ray.clone().applyMatrix4(inv);
            const localRayDir = raycaster.ray.direction.clone().transformDirection(inv).normalize();

            const vec = new THREE.Vector3();
            const closest = new THREE.Vector3();
            const orbit = new THREE.Vector3();
            const radial = new THREE.Vector3();

            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                lifeArray[i] += delta * lifeSpeeds[i];
                if (lifeArray[i] > 1.0) {
                    lifeArray[i] = 0.0;
                    positionArray[i3] = originals[i3]; positionArray[i3+1] = originals[i3+1]; positionArray[i3+2] = originals[i3+2];
                }
                vec.set(positionArray[i3], positionArray[i3+1], positionArray[i3+2]);
                const ox = originals[i3], oy = originals[i3+1], oz = originals[i3+2];
                const dist = localRay.distanceToPoint(vec);
                if (dist < config.gravityRadius && effectiveStrength > 0.01) {
                    localRay.closestPointToPoint(vec, closest);
                    radial.copy(closest).sub(vec).normalize();
                    orbit.crossVectors(localRayDir, radial).normalize();
                    let strength = Math.pow(1.0 - dist / config.gravityRadius, 2);
                    vec.add(radial.multiplyScalar(delta * effectiveStrength * strength * 11.0));
                    vec.add(orbit.multiplyScalar(delta * effectiveStrength * strength * 6.0));
                }
                const returnSpeed = (pointer.x > 500) ? 3.0 : 1.1;
                vec.x += (ox - vec.x) * delta * returnSpeed;
                vec.y += (oy - vec.y) * delta * returnSpeed;
                vec.z += (oz - vec.z) * delta * returnSpeed;
                positionArray[i3] = vec.x; positionArray[i3 + 1] = vec.y; positionArray[i3 + 2] = vec.z;
            }
            particlesGeometry.attributes.position.needsUpdate = true;
            particlesGeometry.attributes.life.needsUpdate = true;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
