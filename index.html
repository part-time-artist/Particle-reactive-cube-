<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Point Cloud</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            color: white;
            font-family: sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 12px;
            pointer-events: none;
            backdrop-filter: blur(5px);
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
        }

        p {
            margin: 5px 0;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
    <!-- Import Three.js from CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div id="info">
        <h2>Deep Space Cloud</h2>
        <p>📦 <b>Shape:</b> Hollow Cube</p>
        <p>🏃 <b>Move Cursor:</b> To attract.</p>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- CONFIGURATION ---
        const isMobile = window.innerWidth < 768;
        const config = {
            color: new THREE.Color(0x0099ff),
            bgColor: new THREE.Color(0x050505),
            pointCount: isMobile ? 8000 : 12000, // Slightly fewer particles for mobile performance
            pointSize: isMobile ? 0.035 : 0.025, // Slightly larger particles for visibility
            speed: 0.2,
            boxSize: isMobile ? 2.5 : 4.0,       // Smaller cube for mobile
            gravityRadius: isMobile ? 1.5 : 2.5, // Smaller attraction area
            gravityStrength: isMobile ? 0.25 : 0.2,
            fogNear: isMobile ? 3.0 : 4.0,
            fogFar: isMobile ? 7.0 : 8.0
        };

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = config.bgColor;
        scene.fog = new THREE.Fog(config.bgColor, config.fogNear, config.fogFar);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = isMobile ? 5 : 6;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Cap pixel ratio for performance
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = true;
        controls.autoRotate = false;

        // --- MOBILE TOUCH OVERRIDE ---
        // Single finger = Attract Particles
        // Two fingers = Rotate Cube
        controls.touches = {
            ONE: null, // Disable rotation with one finger
            TWO: THREE.TOUCH.ROTATE
        };

        // --- PARTICLES ---
        const particlesGeometry = new THREE.BufferGeometry();
        const count = config.pointCount;

        const positions = new Float32Array(count * 3);
        const originals = new Float32Array(count * 3);
        const lives = new Float32Array(count);
        const lifeSpeeds = new Float32Array(count);

        for (let i = 0; i < count; i++) {
            const face = Math.floor(Math.random() * 6);
            const u = (Math.random() - 0.5) * config.boxSize;
            const v = (Math.random() - 0.5) * config.boxSize;
            const half = config.boxSize / 2;

            let x, y, z;
            switch (face) {
                case 0: x = half; y = u; z = v; break;
                case 1: x = -half; y = u; z = v; break;
                case 2: x = u; y = half; z = v; break;
                case 3: x = u; y = -half; z = v; break;
                case 4: x = u; y = v; z = half; break;
                case 5: x = u; y = v; z = -half; break;
            }

            positions[i * 3] = x;
            positions[i * 3 + 1] = y;
            positions[i * 3 + 2] = z;

            originals[i * 3] = x;
            originals[i * 3 + 1] = y;
            originals[i * 3 + 2] = z;

            lives[i] = Math.random();
            lifeSpeeds[i] = 0.2 + Math.random() * 0.6;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particlesGeometry.setAttribute('life', new THREE.BufferAttribute(lives, 1));

        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uColor: { value: config.color },
                uSize: { value: config.pointSize * 50 * window.devicePixelRatio },
                fogColor: { value: config.bgColor },
                fogNear: { value: config.fogNear },
                fogFar: { value: config.fogFar }
            },
            vertexShader: `
                attribute float life;
                varying float vAlpha;
                uniform float uSize;
                varying float vFogDepth;
                void main() {
                    vAlpha = sin(life * 3.14159);
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = uSize * vAlpha * (10.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                    vFogDepth = -mvPosition.z;
                }
            `,
            fragmentShader: `
                uniform vec3 uColor;
                varying float vAlpha;
                uniform vec3 fogColor;
                uniform float fogNear;
                uniform float fogFar;
                varying float vFogDepth;
                void main() {
                    if (length(gl_PointCoord - vec2(0.5, 0.5)) > 0.475) discard;
                    float fogFactor = smoothstep(fogNear, fogFar, vFogDepth);
                    float visibility = 1.0 - fogFactor;
                    gl_FragColor = vec4(uColor, vAlpha * visibility);
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.NormalBlending
        });

        const pointCloud = new THREE.Points(particlesGeometry, shaderMaterial);
        scene.add(pointCloud);

        // --- INTERACTION ---
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2(999, 999);
        const prevPointer = new THREE.Vector2(999, 999);
        let motionIntensity = 0;

        // Desktop handling
        window.addEventListener('pointermove', (event) => {
            if (event.pointerType === 'mouse' || event.pointerType === 'pen') {
                pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
                pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
            }
        });

        // Touch handling (Single finger = Particles, Multiple = Orbit)
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1) {
                const touch = e.touches[0];
                pointer.x = (touch.clientX / window.innerWidth) * 2 - 1;
                pointer.y = -(touch.clientY / window.innerHeight) * 2 + 1;
            } else {
                // If more than 1 finger, we're likely rotating/zooming
                pointer.x = 999;
                pointer.y = 999;
            }
        }, { passive: false });

        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                const touch = e.touches[0];
                pointer.x = (touch.clientX / window.innerWidth) * 2 - 1;
                pointer.y = -(touch.clientY / window.innerHeight) * 2 + 1;
            }
        }, { passive: false });

        window.addEventListener('touchend', () => {
            pointer.x = 999;
            pointer.y = 999;
        });

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            const distMoved = pointer.distanceTo(prevPointer);
            if (distMoved > 0.001 && pointer.x < 500) {
                motionIntensity = 1.0;
            } else {
                motionIntensity = THREE.MathUtils.lerp(motionIntensity, 0, delta * 2.5);
            }
            prevPointer.copy(pointer);

            const effectiveStrength = config.gravityStrength * motionIntensity;

            pointCloud.rotation.x += delta * config.speed * 0.1;
            pointCloud.rotation.y += delta * config.speed * 0.2;

            const posAttr = particlesGeometry.attributes.position;
            const lifeAttr = particlesGeometry.attributes.life;

            raycaster.setFromCamera(pointer, camera);
            const rayDirWorld = raycaster.ray.direction.clone();
            const inverseMatrix = new THREE.Matrix4().copy(pointCloud.matrixWorld).invert();
            const localRay = raycaster.ray.clone().applyMatrix4(inverseMatrix);
            const localRayDir = rayDirWorld.transformDirection(inverseMatrix).normalize();

            const positionArray = posAttr.array;
            const lifeArray = lifeAttr.array;

            const vec = new THREE.Vector3();
            const closest = new THREE.Vector3();
            const orbit = new THREE.Vector3();
            const radial = new THREE.Vector3();

            for (let i = 0; i < count; i++) {
                const i3 = i * 3;

                // Lifecycle
                lifeArray[i] += delta * lifeSpeeds[i];
                if (lifeArray[i] > 1.0) {
                    lifeArray[i] = 0.0;
                    positionArray[i3] = originals[i3];
                    positionArray[i3 + 1] = originals[i3 + 1];
                    positionArray[i3 + 2] = originals[i3 + 2];
                }

                vec.set(positionArray[i3], positionArray[i3 + 1], positionArray[i3 + 2]);
                const ox = originals[i3];
                const oy = originals[i3 + 1];
                const oz = originals[i3 + 2];

                const distSq = localRay.distanceSqToPoint(vec);
                const dist = Math.sqrt(distSq);

                if (dist < config.gravityRadius && effectiveStrength > 0.01) {
                    localRay.closestPointToPoint(vec, closest);
                    radial.copy(closest).sub(vec).normalize();
                    orbit.crossVectors(localRayDir, radial).normalize();

                    let strength = (1.0 - dist / config.gravityRadius);
                    strength = strength * strength;

                    vec.add(radial.multiplyScalar(delta * effectiveStrength * strength * 10.0));
                    vec.add(orbit.multiplyScalar(delta * effectiveStrength * strength * 6.0));
                }

                // Smooth Return to origin
                const returnSpeed = (pointer.x > 500) ? 2.5 : 0.8;
                vec.x += (ox - vec.x) * delta * returnSpeed;
                vec.y += (oy - vec.y) * delta * returnSpeed;
                vec.z += (oz - vec.z) * delta * returnSpeed;

                positionArray[i3] = vec.x;
                positionArray[i3 + 1] = vec.y;
                positionArray[i3 + 2] = vec.z;
            }

            posAttr.needsUpdate = true;
            lifeAttr.needsUpdate = true;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            const isNowMobile = window.innerWidth < 768;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            shaderMaterial.uniforms.uSize.value = config.pointSize * 50 * window.devicePixelRatio;
        });
    </script>
</body>

</html>

</body>
