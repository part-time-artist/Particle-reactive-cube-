<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Cube</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        #canvas-container { width: 100vw; height: 100vh; }
        #info {
            position: absolute;
            top: 40px;
            left: 40px;
            background: rgba(0, 0, 0, 0.15);
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 2px;
            pointer-events: none;
            backdrop-filter: blur(8px);
        }
        h2 {
            margin: 0 0 8px 0;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 2.5px;
            text-transform: uppercase;
        }
        .status-item {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.3); 
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .instruction {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.4);
            line-height: 2;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        .mobile-only { display: none; }
        .desktop-only { display: none; }

        @media (max-width: 767px) {
            #info { top: 20px; left: 20px; right: 20px; padding: 20px; }
            .mobile-only { display: block; }
        }
        @media (min-width: 768px) {
            .desktop-only { display: block; }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">
        <h2>Cloud Cube</h2>
        <div class="status-item">CORE_ACTIVE // WARM_WHITE_v.2.1</div>
        <div class="instruction">
            <div class="mobile-only">
                • 1 finger: interact<br>
                • auto-rotation enabled
            </div>
            <div class="desktop-only">
                • cursor: interact<br>
                • drag: rotate<br>
                • scroll: zoom
            </div>
        </div>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const isMobile = window.innerWidth < 768;
        const config = {
            color: new THREE.Color(0xfff8e1), // WARM WHITE
            bgColor: new THREE.Color(0x050505),
            pointCount: isMobile ? 8000 : 15000,
            pointSize: isMobile ? 0.012 : 0.008, 
            speed: isMobile ? 0.4 : 0.2, // Rotation speed constant
            boxSize: isMobile ? 1.8 : 3.8,       
            gravityRadius: isMobile ? 1.5 : 2.5,
            gravityStrength: isMobile ? 0.22 : 0.18, // Reduced scrunch speed
            fogNear: isMobile ? 3.0 : 4.0,
            fogFar: isMobile ? 7.0 : 8.0
        };

        const scene = new THREE.Scene();
        scene.background = config.bgColor;
        scene.fog = new THREE.Fog(config.bgColor, config.fogNear, config.fogFar);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = isMobile ? 4.5 : 6;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // --- MOBILE OVERRIDE ---
        if (isMobile) {
            controls.enableRotate = false; // Disable manual rotate
            controls.autoRotate = true;   // Auto rotate only
            controls.autoRotateSpeed = 4.0;
        } else {
            controls.enableRotate = true;
            controls.autoRotate = false; // Manual on laptop
        }
        controls.enableZoom = true;

        const particlesGeometry = new THREE.BufferGeometry();
        const count = config.pointCount;
        const positions = new Float32Array(count * 3);
        const originals = new Float32Array(count * 3);
        const lives = new Float32Array(count);
        const lifeSpeeds = new Float32Array(count);

        for (let i = 0; i < count; i++) {
            const face = Math.floor(Math.random() * 6);
            const u = (Math.random() - 0.5) * config.boxSize;
            const v = (Math.random() - 0.5) * config.boxSize;
            const half = config.boxSize / 2;
            let x, y, z;
            switch (face) {
                case 0: x = half; y = u; z = v; break;
                case 1: x = -half; y = u; z = v; break;
                case 2: x = u; y = half; z = v; break;
                case 3: x = u; y = -half; z = v; break;
                case 4: x = u; y = v; z = half; break;
                case 5: x = u; y = v; z = -half; break;
            }
            positions[i * 3] = x; positions[i * 3 + 1] = y; positions[i * 3 + 2] = z;
            originals[i * 3] = x; originals[i * 3 + 1] = y; originals[i * 3 + 2] = z;
            lives[i] = Math.random(); lifeSpeeds[i] = 0.2 + Math.random() * 0.6;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particlesGeometry.setAttribute('life', new THREE.BufferAttribute(lives, 1));

        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uColor: { value: config.color },
                uSize: { value: config.pointSize * 60 * window.devicePixelRatio },
                fogColor: { value: config.bgColor },
                fogNear: { value: config.fogNear },
                fogFar: { value: config.fogFar }
            },
            vertexShader: `
                attribute float life;
                varying float vAlpha;
                uniform float uSize;
                varying float vFogDepth;
                void main() {
                    vAlpha = sin(life * 3.14159);
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = uSize * vAlpha * (10.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                    vFogDepth = -mvPosition.z;
                }
            `,
            fragmentShader: `
                uniform vec3 uColor;
                varying float vAlpha;
                uniform vec3 fogColor;
                uniform float fogNear;
                uniform float fogFar;
                varying float vFogDepth;
                void main() {
                    if (length(gl_PointCoord - vec2(0.5, 0.5)) > 0.475) discard;
                    float fogFactor = smoothstep(fogNear, fogFar, vFogDepth);
                    float visibility = 1.0 - fogFactor;
                    gl_FragColor = vec4(uColor, vAlpha * visibility);
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.NormalBlending
        });

        const pointCloud = new THREE.Points(particlesGeometry, shaderMaterial);
        scene.add(pointCloud);

        const pointer = new THREE.Vector2(999, 999);
        const prevPointer = new THREE.Vector2(999, 999);
        let motionIntensity = 0;

        window.addEventListener('pointermove', (event) => {
            if (event.pointerType === 'mouse') {
                pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
                pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
            }
        });

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1) {
                const touch = e.touches[0];
                pointer.x = (touch.clientX / window.innerWidth) * 2 - 1;
                pointer.y = -(touch.clientY / window.innerHeight) * 2 + 1;
            }
        }, { passive: true });

        window.addEventListener('touchend', () => { pointer.x = 999; pointer.y = 999; });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const distMoved = pointer.distanceTo(prevPointer);
            
            if (distMoved > 0.0005 && pointer.x < 500) {
                motionIntensity = 1.0;
            } else {
                motionIntensity = THREE.MathUtils.lerp(motionIntensity, 0, delta * 2.5);
            }
            prevPointer.copy(pointer);

            const effectiveStrength = config.gravityStrength * (isMobile ? 1.4 : 1.0) * motionIntensity;
            
            // Base inherent rotation
            pointCloud.rotation.x += delta * (isMobile ? 0.2 : 0.05);
            pointCloud.rotation.y += delta * (isMobile ? 0.3 : 0.1);

            const positionArray = particlesGeometry.attributes.position.array;
            const lifeArray = particlesGeometry.attributes.life.array;
            
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(pointer, camera);
            const inverseMatrix = new THREE.Matrix4().copy(pointCloud.matrixWorld).invert();
            const localRay = raycaster.ray.clone().applyMatrix4(inverseMatrix);
            const localRayDir = raycaster.ray.direction.clone().transformDirection(inverseMatrix).normalize();

            const vec = new THREE.Vector3();
            const closest = new THREE.Vector3();
            const orbit = new THREE.Vector3();
            const radial = new THREE.Vector3();

            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                lifeArray[i] += delta * lifeSpeeds[i];
                if (lifeArray[i] > 1.0) {
                    lifeArray[i] = 0.0;
                    positionArray[i3] = originals[i3];
                    positionArray[i3 + 1] = originals[i3 + 1];
                    positionArray[i3 + 2] = originals[i3 + 2];
                }
                vec.set(positionArray[i3], positionArray[i3 + 1], positionArray[i3 + 2]);
                const ox = originals[i3], oy = originals[i3 + 1], oz = originals[i3 + 2];
                const dist = localRay.distanceToPoint(vec);
                if (dist < config.gravityRadius && effectiveStrength > 0.01) {
                    localRay.closestPointToPoint(vec, closest);
                    radial.copy(closest).sub(vec).normalize();
                    orbit.crossVectors(localRayDir, radial).normalize();
                    let strength = Math.pow(1.0 - dist / config.gravityRadius, 2);
                    vec.add(radial.multiplyScalar(delta * effectiveStrength * strength * 14.0));
                    vec.add(orbit.multiplyScalar(delta * effectiveStrength * strength * 8.0));
                }
                const returnSpeed = (pointer.x > 500) ? 3.0 : 1.2;
                vec.x += (ox - vec.x) * delta * returnSpeed;
                vec.y += (oy - vec.y) * delta * returnSpeed;
                vec.z += (oz - vec.z) * delta * returnSpeed;
                positionArray[i3] = vec.x; positionArray[i3 + 1] = vec.y; positionArray[i3 + 2] = vec.z;
            }
            particlesGeometry.attributes.position.needsUpdate = true;
            particlesGeometry.attributes.life.needsUpdate = true;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
